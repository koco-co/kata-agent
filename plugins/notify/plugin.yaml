name: notify
title: 通知
version: 0.4.0
type: notification
actions:
  - id: notify.sendNotification
    title: 发送 DingTalk 通知
    inputSchema: NotificationRequest
    outputSchema: NotificationResult
    sideEffects:
      network: true
      writeArtifacts: false
      external: true
permissions:
  network: restricted
  secrets:
    - DINGTALK_WEBHOOK_URL
    - DINGTALK_SECRET
  writeScopes: []
