name: zentao
title: Zentao 问题同步
version: 0.4.0
type: issue-tracker
actions:
  - id: zentao.syncIssue
    title: 同步 IssueDraft 到 Zentao
    inputSchema: IssueDraft
    outputSchema: IssueSyncResult
    sideEffects:
      network: true
      writeArtifacts: false
      external: true
permissions:
  network: restricted
  secrets:
    - ZENTAO_BASE_URL
    - ZENTAO_TOKEN
  writeScopes: []
