name: ui-script-gen
title: UI 自动化脚本生成
version: 0.3.0
description: 从 TestSpec 生成 web-only FlowSpec、RunPlan、Playwright 脚本、RunRecord、EvidencePack、BugReport 和 HTML 报告。
workflow: ui-script-gen
inputs:
  schema: UiScriptGenInput
outputs:
  - FlowSpec
  - RunPlan
  - RunRecord
  - EvidencePack
  - BugReport
  - HtmlReport
requiredPlugins:
  - playwright
  - report
  - notify
